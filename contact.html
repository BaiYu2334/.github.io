<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青岛理工大学艺术与设计学院 - 联系我们</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Source Han Sans CN', 'Noto Sans SC', 'PingFang SC', sans-serif;
            background: #f8f9fa;
            color: #333;
        }
        .header {
            background: linear-gradient(135deg, #003366 0%, #800020 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
        }
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 40px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            padding: 40px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #003366;
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #003366;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .contact-item {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }
        .contact-item i {
            font-size: 36px;
            color: #003366;
            margin-bottom: 15px;
        }
        .contact-item h3 {
            color: #333;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .contact-item p {
            color: #666;
            line-height: 1.6;
        }
        .map-section {
            background: linear-gradient(135deg, #003366 0%, #800020 100%);
            padding: 40px;
            border-radius: 16px;
            color: white;
            text-align: center;
        }
        .map-section h3 {
            margin-bottom: 20px;
        }
        .map-placeholder {
            background: rgba(255,255,255,0.1);
            padding: 60px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0.8;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #003366 0%, #800020 100%);
            color: white;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 51, 102, 0.3);
        }
        .footer {
            background: #222;
            color: #aaa;
            text-align: center;
            padding: 30px;
            margin-top: 60px;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>联系我们</h1>
        <p>期待与您的交流与合作</p>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>联系方式</h2>
            <div class="contact-grid">
                <div class="contact-item">
                    <i>🏢</i>
                    <h3>学院办公室</h3>
                    <p>电话：0532-85071580</p>
                    <p>邮箱：art@qut.edu.cn</p>
                </div>
                <div class="contact-item">
                    <i>📚</i>
                    <h3>教务办公室</h3>
                    <p>电话：0532-85071581</p>
                    <p>邮箱：jw@qut.edu.cn</p>
                </div>
                <div class="contact-item">
                    <i>🎓</i>
                    <h3>学生工作办公室</h3>
                    <p>电话：0532-85071582</p>
                    <p>邮箱：xgb@qut.edu.cn</p>
                </div>
                <div class="contact-item">
                    <i>📍</i>
                    <h3>地址</h3>
                    <p>山东省青岛市市南区</p>
                    <p>宁夏路308号</p>
                </div>
            </div>
        </div>
        
        <div class="map-section">
            <h3>校园地图</h3>
            <div class="map-placeholder">
                🗺️ 青岛理工大学艺术与设计学院位置：<br>
                山东省青岛市市南区宁夏路308号<br>
                艺术楼（A座）3-5层
            </div>
        </div>
        
        <a href="index.html" class="btn-back">返回首页</a>
    </div>
    
    <div class="footer">
        <p>青岛理工大学艺术与设计学院 版权所有</p>
    </div>
</body>
</html>
