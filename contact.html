<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青岛理工大学艺术与设计学院 - 联系我们</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Source Han Sans CN', 'Noto Sans SC', 'PingFang SC', sans-serif;
            background: #f5f5f5;
            color: #222;
        }
        .header {
            background: linear-gradient(135deg, #222 0%, #111 100%);
            color: white;
            padding: 60px 40px;
            text-align: center;
        }
        .header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }
        .header p {
            font-size: 16px;
            opacity: 0.9;
        }
        .container {
            max-width: 1200px;
            margin: 60px auto;
            padding: 0 40px;
        }
        .card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.08);
            padding: 40px;
            margin-bottom: 30px;
        }
        .card h2 {
            color: #222;
            font-size: 24px;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 2px solid #222;
        }
        .contact-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            margin-top: 30px;
        }
        .contact-item {
            background: #e0e0e0;
            padding: 30px;
            border-radius: 12px;
            text-align: center;
        }
        .contact-item i {
            font-size: 36px;
            color: #222;
            margin-bottom: 15px;
        }
        .contact-item h3 {
            color: #222;
            font-size: 18px;
            margin-bottom: 10px;
        }
        .contact-item p {
            color: #222;
            line-height: 1.6;
        }
        .map-section {
            background: linear-gradient(135deg, #222 0%, #111 100%);
            padding: 40px;
            border-radius: 16px;
            color: white;
            text-align: center;
        }
        .map-section h3 {
            margin-bottom: 20px;
        }
        .map-placeholder {
            background: rgba(255,255,255,0.1);
            padding: 60px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0.8;
        }
        .btn-back {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(135deg, #222 0%, #111 100%);
            color: white;
            border-radius: 25px;
            text-decoration: none;
            font-weight: 500;
            margin-top: 30px;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-back:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(34, 34, 34, 0.3);
        }
        .footer {
            background: #222;
            color: #aaa;
            text-align: center;
            padding: 30px;
            margin-top: 60px;
        }
        .art-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <canvas class="art-canvas"></canvas>
    <div class="header">
        <h1>联系我们</h1>
        <p>期待与您的交流与合作</p>
    </div>
    
    <div class="container">
        <div class="card">
            <h2>联系方式</h2>
            <div class="contact-grid">
                <div class="contact-item">
                    <i>🏢</i>
                    <h3>学院办公室</h3>
                    <p>电话：0532-85071580</p>
                    <p>邮箱：art@qut.edu.cn</p>
                </div>
                <div class="contact-item">
                    <i>📚</i>
                    <h3>教务办公室</h3>
                    <p>电话：0532-85071581</p>
                    <p>邮箱：jw@qut.edu.cn</p>
                </div>
                <div class="contact-item">
                    <i>🎓</i>
                    <h3>学生工作办公室</h3>
                    <p>电话：0532-85071582</p>
                    <p>邮箱：xgb@qut.edu.cn</p>
                </div>
                <div class="contact-item">
                    <i>📍</i>
                    <h3>地址</h3>
                    <p>山东省青岛市市南区</p>
                    <p>宁夏路308号</p>
                </div>
            </div>
        </div>
        
        <div class="map-section">
            <h3>校园地图</h3>
            <div class="map-placeholder">
                🗺️ 青岛理工大学艺术与设计学院位置：<br>
                山东省青岛市市南区宁夏路308号<br>
                艺术楼（A座）3-5层
            </div>
        </div>
        
        <a href="index.html" class="btn-back">返回首页</a>
    </div>
    
    <div class="footer">
        <p>青岛理工大学艺术与设计学院 版权所有</p>
    </div>
    <script>
        const artCanvas = document.querySelector('.art-canvas');
        const ctx = artCanvas.getContext('2d');
        function resizeCanvas() {
            artCanvas.width = window.innerWidth;
            artCanvas.height = window.innerHeight;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);
        let stars = [];
        const maxStars = 20;
        document.addEventListener('mousemove', function(e) {
            stars.push({
                x: e.clientX,
                y: e.clientY,
                size: 8 + Math.random() * 12,
                rotation: Math.random() * 360,
                alpha: 1
            });
            if (stars.length > maxStars) {
                stars.shift();
            }
        });
        function drawStar(ctx, x, y, size, rotation) {
            ctx.beginPath();
            for (let i = 0; i < 5; i++) {
                const angle1 = (i * 4 * Math.PI) / 5 - Math.PI / 2 + (rotation * Math.PI) / 180;
                const angle2 = angle1 + Math.PI / 5;
                const x1 = x + Math.cos(angle1) * size;
                const y1 = y + Math.sin(angle1) * size;
                const x2 = x + Math.cos(angle2) * size * 0.4;
                const y2 = y + Math.sin(angle2) * size * 0.4;
                if (i === 0) {
                    ctx.moveTo(x1, y1);
                } else {
                    ctx.lineTo(x1, y1);
                }
                ctx.lineTo(x2, y2);
            }
            ctx.closePath();
        }
        function drawStars() {
            ctx.clearRect(0, 0, artCanvas.width, artCanvas.height);
            stars.forEach((star, index) => {
                const fadeFactor = stars.length > 1 ? (index + 1) / stars.length : 1;
                const alpha = star.alpha * fadeFactor;
                const size = star.size * fadeFactor;
                if (alpha <= 0.05) return;
                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.fillStyle = '#FFD93D';
                ctx.strokeStyle = '#FFC125';
                ctx.lineWidth = 1;
                drawStar(ctx, star.x, star.y, size, star.rotation);
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            });
            stars = stars.map(star => ({
                ...star,
                alpha: star.alpha - 0.025
            })).filter(star => star.alpha > 0);
            requestAnimationFrame(drawStars);
        }
        drawStars();
    </script>
</body>
</html>
